<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Martina Faria AI - Premium Demo</title>
    
    <!-- Fuentes y Estilos -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/@n8n/chat/dist/style.css" rel="stylesheet" />
    
    <style>
        :root {
          --chat--color-primary: #0f172a; 
          --chat--window--background: rgba(255, 255, 255, 0.85);
          --chat--window--backdrop-filter: blur(20px) saturate(180%);
          --chat--window--border-radius: 24px;
        }

        body { margin: 0; padding: 0; overflow: hidden; background-color: #0f172a; font-family: 'Inter', sans-serif; }
        
        #iframeLayer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            border: none; z-index: 1; opacity: 0; transition: opacity 1.5s ease-in-out;
        }

        #botWrapper { position: fixed; bottom: 25px; right: 25px; z-index: 999999; display: flex; flex-direction: column; align-items: flex-end; }
        
        #stitchChatToggle {
            width: 65px; height: 65px; border-radius: 50%;
            background-color: #0f172a; border: 3px solid #fff; cursor: pointer;
            background-image: url('https://martinafaria.ca/wp-content/uploads/2023/04/Martina-Faria-Avatar.png');
            background-size: cover; box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            transition: transform 0.3s;
        }
        #stitchChatToggle:hover { transform: scale(1.1); }

        #stitchChatWindow {
            width: 400px; height: 650px; max-height: 80vh;
            background: var(--chat--window--background);
            backdrop-filter: var(--chat--window--backdrop-filter);
            border-radius: 24px; margin-bottom: 20px;
            display: flex; flex-direction: column; overflow: hidden;
            opacity: 0; transform: translateY(30px); transition: all 0.4s;
            pointer-events: none;
        }
        #stitchChatWindow.open { opacity: 1; transform: translateY(0); pointer-events: auto; }

        #stitchChatHeader { background: #0f172a; color: white; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; height: 65px; }
        #stitchChatHeader h3 { margin: 0; font-size: 1.1rem; }
        .close-btn { background: none; border: none; color: white; cursor: pointer; font-size: 20px; }

        #n8nContainer { height: calc(100% - 65px); width: 100%; }
        
        /* Fix n8n internal */
        .chat-layout .chat-header { display: none !important; }
        .chat-layout { height: 100% !important; background: transparent !important; }
    </style>
</head>
<body>
    <iframe id="iframeLayer" src="https://martinafaria.ca" onload="this.style.opacity='1'"></iframe>

    <div id="botWrapper">
        <div id="stitchChatWindow">
            <div id="stitchChatHeader">
                <h3>Martina Faria AI</h3>
                <button class="close-btn" id="btnCloseChat">×</button>
            </div>
            <div id="n8nContainer"></div>
        </div>
        <div id="stitchChatToggle"></div>
    </div>

    <script type="module">
        import { createChat } from 'https://cdn.jsdelivr.net/npm/@n8n/chat/dist/chat.bundle.es.js';
        const win = document.getElementById('stitchChatWindow');
        let init = false;

        document.getElementById('stitchChatToggle').onclick = () => {
            win.classList.toggle('open');
            if (!init) {
                createChat({
                    webhookUrl: 'https://n8n.marianochena.com/webhook/a14269ce-7210-4702-b964-1fda468c4abc/chat',
                    target: '#n8nContainer', mode: 'fullscreen',
                    initialMessages: ['¡Hola! Soy Martina AI. 👋']
                });
                init = true;
            }
        };
        document.getElementById('btnCloseChat').onclick = () => win.classList.remove('open');
    </script>
</body>
</html>
